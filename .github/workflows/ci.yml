name: CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    # Pinned to the macOS 26 image: Package.swift needs Swift tools 6.3 (Xcode 26) and the
    # menu-bar app/CLI target .macOS(.v26); an older default Xcode fails to resolve the manifest.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.app || true

      - name: Toolchain
        run: |
          swift --version
          xcodebuild -version

      # The menu-bar app (Apps/MenuBarApp) and faux CLI are not linked by the
      # tests, so they are built explicitly in the steps below to catch
      # regressions.
      - name: Swift test
        run: swift test -v

      # The faux CLI is an executable product the test suite does not link, so
      # build it explicitly to catch CLI regressions.
      - name: Build faux CLI
        run: swift build --product faux

      # The menu-bar app is also unlinked by the tests; build it to catch app
      # regressions before a release tag does.
      - name: Build FauxCam app
        run: swift build --product FauxCamApp

      # The injected guest dylib (Objective-C/C). Ad-hoc signed, no identity
      # needed. Allowed to fail on runners without the required simulator SDK.
      - name: Build guest dylib
        continue-on-error: true
        run: bash Scripts/build-dylib.sh
